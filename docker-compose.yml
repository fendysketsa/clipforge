services:
  backend:
    build:
      context: ./backend
    container_name: clipforge-backend
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    environment:
      IN_DOCKER: "1"
      JOBS_PATH: /app/data/jobs.json
      DEFAULT_AI_BASE_URL: http://127.0.0.1:11434/v1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    container_name: clipforge-frontend
    environment:
      BACKEND_API_BASE: http://172.18.0.1:8010
      BACKEND_API_BASES: http://172.18.0.1:8010,http://172.17.0.1:8010,http://host.docker.internal:8010,http://127.0.0.1:8010
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./backend
    container_name: clipforge-telegram-bot
    command: ["python", "telegram_bot.py"]
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs:ro
      - ./backend/data:/app/data
    environment:
      BACKEND_API_BASE: http://127.0.0.1:8010
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID:-}
      TELEGRAM_PUBLIC_BASE_URL: ${TELEGRAM_PUBLIC_BASE_URL:-}
      TELEGRAM_MAX_UPLOAD_MB: ${TELEGRAM_MAX_UPLOAD_MB:-49}
    depends_on:
      - backend
    init: true
    restart: unless-stopped
