services:
  backend:
    build:
      context: ./backend
    container_name: clipforge-backend
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
      - ${YOUTUBE_CHROMIUM_HOST_USER_DATA_DIR:-./backend/data/chromium-youtube}:${YOUTUBE_CHROMIUM_USER_DATA_DIR:-/app/data/chromium-youtube}
    environment:
      IN_DOCKER: "1"
      JOBS_PATH: /app/data/jobs.json
      YOUTUBE_UPLOADS_PATH: /app/data/youtube_uploads.json
      YOUTUBE_PLAYWRIGHT_STATE: /app/data/youtube_storage_state.json
      YOUTUBE_CHROMIUM_USER_DATA_DIR: ${YOUTUBE_CHROMIUM_USER_DATA_DIR:-}
      YOUTUBE_CHROMIUM_PROFILE_DIRECTORY: ${YOUTUBE_CHROMIUM_PROFILE_DIRECTORY:-}
      YOUTUBE_ALLOW_CHROMIUM_PROFILE_UPLOAD: ${YOUTUBE_ALLOW_CHROMIUM_PROFILE_UPLOAD:-false}
      YOUTUBE_CDP_URL: ${YOUTUBE_CDP_URL:-http://127.0.0.1:9222}
      YOUTUBE_HEADLESS: ${YOUTUBE_HEADLESS:-true}
      YOUTUBE_DEFAULT_VISIBILITY: ${YOUTUBE_DEFAULT_VISIBILITY:-private}
      YOUTUBE_MADE_FOR_KIDS: ${YOUTUBE_MADE_FOR_KIDS:-false}
      YOUTUBE_DEFAULT_TAGS: ${YOUTUBE_DEFAULT_TAGS:-}
      YOUTUBE_DEFAULT_PLAYLIST: ${YOUTUBE_DEFAULT_PLAYLIST:-Islam}
      YOUTUBE_TARGET_CHANNEL: ${YOUTUBE_TARGET_CHANNEL:-ryuundy8812}
      YOUTUBE_TARGET_EMAIL: ${YOUTUBE_TARGET_EMAIL:-fendysketsa@gmail.com}
      YOUTUBE_AUTO_UPLOAD_COUNT: ${YOUTUBE_AUTO_UPLOAD_COUNT:-3}
      YOUTUBE_REQUIRE_COPYRIGHT_CHECKS: ${YOUTUBE_REQUIRE_COPYRIGHT_CHECKS:-true}
      YOUTUBE_CHECKS_TIMEOUT_SECONDS: ${YOUTUBE_CHECKS_TIMEOUT_SECONDS:-300}
      YOUTUBE_DRY_RUN: ${YOUTUBE_DRY_RUN:-false}
      DEFAULT_AI_BASE_URL: http://127.0.0.1:11434/v1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    container_name: clipforge-frontend
    environment:
      BACKEND_API_BASE: http://172.18.0.1:8010
      BACKEND_API_BASES: http://172.18.0.1:8010,http://172.17.0.1:8010,http://host.docker.internal:8010,http://127.0.0.1:8010
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./backend
    container_name: clipforge-telegram-bot
    command: ["python", "telegram_bot.py"]
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs:ro
      - ./backend/data:/app/data
    environment:
      BACKEND_API_BASE: http://127.0.0.1:8010
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID:-}
      TELEGRAM_PUBLIC_BASE_URL: ${TELEGRAM_PUBLIC_BASE_URL:-}
      TELEGRAM_MAX_UPLOAD_MB: ${TELEGRAM_MAX_UPLOAD_MB:-49}
      YOUTUBE_STUDIO_URL: ${YOUTUBE_STUDIO_URL:-https://studio.youtube.com}
    depends_on:
      - backend
    init: true
    restart: unless-stopped
