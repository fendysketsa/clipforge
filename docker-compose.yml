services:
  backend:
    build:
      context: ./backend
    container_name: clipforge-backend
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
      - ./scripts:/app/scripts:ro
      - ${YOUTUBE_CHROMIUM_HOST_USER_DATA_DIR:-./backend/data/chromium-youtube}:${YOUTUBE_CHROMIUM_USER_DATA_DIR:-/app/data/chromium-youtube}
    environment:
      IN_DOCKER: "1"
      JOBS_PATH: /app/data/jobs.json
      YOUTUBE_UPLOADS_PATH: /app/data/youtube_uploads.json
      YOUTUBE_PLAYWRIGHT_STATE: /app/data/youtube_storage_state.json
      YOUTUBE_CHROMIUM_USER_DATA_DIR: ${YOUTUBE_CHROMIUM_USER_DATA_DIR:-}
      YOUTUBE_CHROMIUM_PROFILE_DIRECTORY: ${YOUTUBE_CHROMIUM_PROFILE_DIRECTORY:-}
      YOUTUBE_ALLOW_CHROMIUM_PROFILE_UPLOAD: ${YOUTUBE_ALLOW_CHROMIUM_PROFILE_UPLOAD:-false}
      YOUTUBE_CDP_URL: ${YOUTUBE_CDP_URL:-http://127.0.0.1:9222}
      YOUTUBE_UPLOAD_USE_CDP: ${YOUTUBE_UPLOAD_USE_CDP:-true}
      YOUTUBE_UPLOAD_FORCE_CDP: ${YOUTUBE_UPLOAD_FORCE_CDP:-true}
      YOUTUBE_CDP_REFRESH_COMMAND: ${YOUTUBE_CDP_REFRESH_COMMAND:-/app/scripts/open-youtube-login-chrome.sh}
      YOUTUBE_CDP_REFRESH_LOG: ${YOUTUBE_CDP_REFRESH_LOG:-/tmp/clipforge-youtube-chrome-launcher.log}
      YOUTUBE_CDP_REFRESH_READY_TIMEOUT_SECONDS: ${YOUTUBE_CDP_REFRESH_READY_TIMEOUT_SECONDS:-30}
      YOUTUBE_LOGIN_SOURCE_PROFILE_DIR: ${YOUTUBE_LOGIN_SOURCE_PROFILE_DIR:-/app/data/chromium-youtube}
      YOUTUBE_LOGIN_PROFILE_DIR: ${YOUTUBE_LOGIN_PROFILE_DIR:-/app/data/youtube-chrome-profile}
      YOUTUBE_LOGIN_PROFILE_DIRECTORY: ${YOUTUBE_LOGIN_PROFILE_DIRECTORY:-auto}
      YOUTUBE_CHROME_HEADLESS: ${YOUTUBE_CHROME_HEADLESS:-true}
      YOUTUBE_MAX_UPLOAD_MB: ${YOUTUBE_MAX_UPLOAD_MB:-45}
      YOUTUBE_CDP_MAX_UPLOAD_MB: ${YOUTUBE_CDP_MAX_UPLOAD_MB:-45}
      CLIP_MAX_MB: ${CLIP_MAX_MB:-45}
      YOUTUBE_HEADLESS: ${YOUTUBE_HEADLESS:-true}
      YOUTUBE_DEFAULT_VISIBILITY: ${YOUTUBE_DEFAULT_VISIBILITY:-public}
      YOUTUBE_MADE_FOR_KIDS: ${YOUTUBE_MADE_FOR_KIDS:-false}
      YOUTUBE_DEFAULT_TAGS: ${YOUTUBE_DEFAULT_TAGS:-}
      YOUTUBE_DEFAULT_PLAYLIST: ${YOUTUBE_DEFAULT_PLAYLIST:-Islam}
      YOUTUBE_TARGET_CHANNEL: ${YOUTUBE_TARGET_CHANNEL:-ryuundy8812}
      YOUTUBE_TARGET_EMAIL: ${YOUTUBE_TARGET_EMAIL:-fendysketsa@gmail.com}
      YOUTUBE_TARGET_CHANNEL_ID: ${YOUTUBE_TARGET_CHANNEL_ID:-UCAOZF9Qzj6DYoXKtLnP4UUQ}
      YOUTUBE_STUDIO_URL: ${YOUTUBE_STUDIO_URL:-https://studio.youtube.com/channel/UCAOZF9Qzj6DYoXKtLnP4UUQ}
      YOUTUBE_AUTO_UPLOAD_COUNT: ${YOUTUBE_AUTO_UPLOAD_COUNT:-3}
      YOUTUBE_REQUIRE_COPYRIGHT_CHECKS: ${YOUTUBE_REQUIRE_COPYRIGHT_CHECKS:-true}
      YOUTUBE_CONTINUE_WHEN_CHECKS_STUCK: ${YOUTUBE_CONTINUE_WHEN_CHECKS_STUCK:-false}
      YOUTUBE_CHECKS_TIMEOUT_SECONDS: ${YOUTUBE_CHECKS_TIMEOUT_SECONDS:-600}
      YOUTUBE_PRE_PUBLISH_REVIEW_TIMEOUT_SECONDS: ${YOUTUBE_PRE_PUBLISH_REVIEW_TIMEOUT_SECONDS:-300}
      YOUTUBE_RELOAD_AFTER_PUBLISH: ${YOUTUBE_RELOAD_AFTER_PUBLISH:-true}
      YOUTUBE_RELOAD_AFTER_PUBLISH_DELAY_SECONDS: ${YOUTUBE_RELOAD_AFTER_PUBLISH_DELAY_SECONDS:-10}
      YOUTUBE_MANUAL_SUBTITLE_TEXT: ${YOUTUBE_MANUAL_SUBTITLE_TEXT:-RYUUNDY}
      YOUTUBE_SUBTITLE_TYPE_DELAY_MS: ${YOUTUBE_SUBTITLE_TYPE_DELAY_MS:-120}
      YOUTUBE_SUBTITLE_EDITOR_READY_DELAY_MS: ${YOUTUBE_SUBTITLE_EDITOR_READY_DELAY_MS:-1500}
      YOUTUBE_SUBTITLE_SEGMENT_READY_DELAY_MS: ${YOUTUBE_SUBTITLE_SEGMENT_READY_DELAY_MS:-3000}
      YOUTUBE_SUBTITLE_AFTER_TYPE_DELAY_MS: ${YOUTUBE_SUBTITLE_AFTER_TYPE_DELAY_MS:-500}
      YOUTUBE_SUBTITLE_ADD_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_ADD_TIMEOUT_MS:-5000}
      YOUTUBE_SUBTITLE_MODE_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_MODE_TIMEOUT_MS:-5000}
      YOUTUBE_SUBTITLE_TEXT_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_TEXT_TIMEOUT_MS:-8000}
      YOUTUBE_SUBTITLE_DONE_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_DONE_TIMEOUT_MS:-5000}
      YOUTUBE_MANUAL_SUBTITLE_REQUIRED: ${YOUTUBE_MANUAL_SUBTITLE_REQUIRED:-false}
      YOUTUBE_UPLOAD_TIMEOUT_SECONDS: ${YOUTUBE_UPLOAD_TIMEOUT_SECONDS:-900}
      YOUTUBE_STUDIO_NAV_TIMEOUT_MS: ${YOUTUBE_STUDIO_NAV_TIMEOUT_MS:-60000}
      YOUTUBE_DIRECT_UPLOAD_NAV_TIMEOUT_MS: ${YOUTUBE_DIRECT_UPLOAD_NAV_TIMEOUT_MS:-60000}
      YOUTUBE_DIRECT_UPLOAD_INPUT_TIMEOUT_MS: ${YOUTUBE_DIRECT_UPLOAD_INPUT_TIMEOUT_MS:-20000}
      YOUTUBE_ALLOW_DIRECT_UPLOAD_PAGE_FALLBACK: ${YOUTUBE_ALLOW_DIRECT_UPLOAD_PAGE_FALLBACK:-true}
      YOUTUBE_DRY_RUN: ${YOUTUBE_DRY_RUN:-false}
      YOUTUBE_CLOSE_UPLOAD_TAB: ${YOUTUBE_CLOSE_UPLOAD_TAB:-false}
      TELEGRAM_AI_BASE_URL: ${TELEGRAM_AI_BASE_URL:-http://127.0.0.1:11434/v1}
      TELEGRAM_AI_MODEL: ${TELEGRAM_AI_MODEL:-deepseek-v4-flash:cloud}
      TELEGRAM_AI_FALLBACK_MODELS: ${TELEGRAM_AI_FALLBACK_MODELS:-llama3:latest}
      YOUTUBE_REQUIRE_AI_METADATA: ${YOUTUBE_REQUIRE_AI_METADATA:-true}
      DEFAULT_AI_BASE_URL: http://127.0.0.1:11434/v1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    container_name: clipforge-frontend
    environment:
      BACKEND_API_BASE: http://172.18.0.1:8010
      BACKEND_API_BASES: http://172.18.0.1:8010,http://172.17.0.1:8010,http://host.docker.internal:8010,http://127.0.0.1:8010
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./backend
    container_name: clipforge-telegram-bot
    command: ["python", "telegram_bot.py"]
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs:ro
      - ./backend/data:/app/data
    environment:
      BACKEND_API_BASE: http://127.0.0.1:8010
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID:-}
      TELEGRAM_PUBLIC_BASE_URL: ${TELEGRAM_PUBLIC_BASE_URL:-}
      TELEGRAM_MAX_UPLOAD_MB: ${TELEGRAM_MAX_UPLOAD_MB:-49}
      YOUTUBE_STUDIO_URL: ${YOUTUBE_STUDIO_URL:-https://studio.youtube.com/channel/UCAOZF9Qzj6DYoXKtLnP4UUQ}
      TELEGRAM_AI_BASE_URL: ${TELEGRAM_AI_BASE_URL:-http://127.0.0.1:11434/v1}
      TELEGRAM_AI_MODEL: ${TELEGRAM_AI_MODEL:-deepseek-v4-flash:cloud}
      TELEGRAM_AI_FALLBACK_MODELS: ${TELEGRAM_AI_FALLBACK_MODELS:-llama3:latest}
      TELEGRAM_YOUTUBE_CDP_REFRESH_TIMEOUT_SECONDS: ${TELEGRAM_YOUTUBE_CDP_REFRESH_TIMEOUT_SECONDS:-60}
    depends_on:
      - backend
    init: true
    restart: unless-stopped
