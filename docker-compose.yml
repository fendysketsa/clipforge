services:
  backend:
    build:
      context: ./backend
    container_name: clipforge-backend
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
      - ./scripts:/app/scripts:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${YOUTUBE_HOST_RUNTIME_DIR:-/run/user/1000}:/run/clipforge-host-user:ro
    environment:
      IN_DOCKER: "1"
      JOBS_PATH: /app/data/jobs.json
      YOUTUBE_UPLOADS_PATH: /app/data/youtube_uploads.json
      YOUTUBE_PLAYWRIGHT_STATE: /app/data/youtube_storage_state.json
      DISPLAY: ${YOUTUBE_DISPLAY:-:1}
      YOUTUBE_HOST_RUNTIME_DIR: /run/clipforge-host-user
      YOUTUBE_LOGIN_HEADLESS: "false"
      YOUTUBE_CHROMIUM_USER_DATA_DIR: ${YOUTUBE_CHROMIUM_USER_DATA_DIR:-/app/data/youtube-playwright-profile}
      YOUTUBE_CHROMIUM_PROFILE_DIRECTORY: ${YOUTUBE_CHROMIUM_PROFILE_DIRECTORY:-}
      YOUTUBE_ALLOW_CHROMIUM_PROFILE_UPLOAD: ${YOUTUBE_ALLOW_CHROMIUM_PROFILE_UPLOAD:-false}
      YOUTUBE_CDP_URL: ${YOUTUBE_CDP_URL:-http://127.0.0.1:9222}
      YOUTUBE_UPLOAD_USE_CDP: ${YOUTUBE_UPLOAD_USE_CDP:-false}
      YOUTUBE_UPLOAD_FORCE_CDP: ${YOUTUBE_UPLOAD_FORCE_CDP:-false}
      YOUTUBE_UPLOAD_STORAGE_STATE_FIRST: ${YOUTUBE_UPLOAD_STORAGE_STATE_FIRST:-true}
      YOUTUBE_UPLOAD_ALLOW_LAST_RESORT_FALLBACK: ${YOUTUBE_UPLOAD_ALLOW_LAST_RESORT_FALLBACK:-true}
      YOUTUBE_CDP_UPLOAD_REPAIR_ATTEMPTS: ${YOUTUBE_CDP_UPLOAD_REPAIR_ATTEMPTS:-3}
      YOUTUBE_CDP_UPLOAD_MAX_ATTEMPTS: ${YOUTUBE_CDP_UPLOAD_MAX_ATTEMPTS:-6}
      YOUTUBE_CDP_REFRESH_COMMAND: ${YOUTUBE_CDP_REFRESH_COMMAND:-/app/scripts/open-youtube-login-chrome.sh}
      YOUTUBE_CDP_REFRESH_LOG: ${YOUTUBE_CDP_REFRESH_LOG:-/tmp/clipforge-youtube-chrome-launcher.log}
      YOUTUBE_CDP_REFRESH_READY_TIMEOUT_SECONDS: ${YOUTUBE_CDP_REFRESH_READY_TIMEOUT_SECONDS:-30}
      TELEGRAM_YOUTUBE_ONE_TIME_LOGIN_TIMEOUT_SECONDS: ${TELEGRAM_YOUTUBE_ONE_TIME_LOGIN_TIMEOUT_SECONDS:-180}
      YOUTUBE_ONE_TIME_LOGIN_PROFILE_TIMEOUT_SECONDS: ${YOUTUBE_ONE_TIME_LOGIN_PROFILE_TIMEOUT_SECONDS:-90}
      YOUTUBE_ONE_TIME_LOGIN_ALLOW_CDP_FALLBACK: ${YOUTUBE_ONE_TIME_LOGIN_ALLOW_CDP_FALLBACK:-true}
      YOUTUBE_LOGIN_SOURCE_PROFILE_DIR: ${YOUTUBE_LOGIN_SOURCE_PROFILE_DIR:-/app/data/youtube-playwright-profile}
      YOUTUBE_LOGIN_PROFILE_DIR: ${YOUTUBE_LOGIN_PROFILE_DIR:-/app/data/youtube-playwright-profile}
      YOUTUBE_LOGIN_PROFILE_DIRECTORY: ${YOUTUBE_LOGIN_PROFILE_DIRECTORY:-Default}
      YOUTUBE_CHROME_HEADLESS: ${YOUTUBE_CHROME_HEADLESS:-false}
      YOUTUBE_MAX_UPLOAD_MB: ${YOUTUBE_MAX_UPLOAD_MB:-45}
      YOUTUBE_CDP_MAX_UPLOAD_MB: ${YOUTUBE_CDP_MAX_UPLOAD_MB:-45}
      CLIP_MAX_MB: ${CLIP_MAX_MB:-45}
      YOUTUBE_HEADLESS: ${YOUTUBE_HEADLESS:-true}
      YOUTUBE_DEFAULT_VISIBILITY: ${YOUTUBE_DEFAULT_VISIBILITY:-public}
      YOUTUBE_MADE_FOR_KIDS: ${YOUTUBE_MADE_FOR_KIDS:-false}
      YOUTUBE_DEFAULT_TAGS: ${YOUTUBE_DEFAULT_TAGS:-}
      YOUTUBE_DEFAULT_PLAYLIST: ${YOUTUBE_DEFAULT_PLAYLIST:-Islam}
      YOUTUBE_TARGET_CHANNEL: ${YOUTUBE_TARGET_CHANNEL:-ryuundyofficial}
      YOUTUBE_TARGET_EMAIL: ${YOUTUBE_TARGET_EMAIL:-fendysketsa@gmail.com}
      YOUTUBE_TARGET_CHANNEL_ID: ${YOUTUBE_TARGET_CHANNEL_ID:-UCAOZF9Qzj6DYoXKtLnP4UUQ}
      YOUTUBE_STUDIO_URL: ${YOUTUBE_STUDIO_URL:-https://studio.youtube.com/channel/UCAOZF9Qzj6DYoXKtLnP4UUQ}
      YOUTUBE_AUTO_UPLOAD_COUNT: ${YOUTUBE_AUTO_UPLOAD_COUNT:-3}
      YOUTUBE_REQUIRE_COPYRIGHT_CHECKS: ${YOUTUBE_REQUIRE_COPYRIGHT_CHECKS:-true}
      YOUTUBE_CONTINUE_WHEN_CHECKS_STUCK: ${YOUTUBE_CONTINUE_WHEN_CHECKS_STUCK:-false}
      YOUTUBE_CHECKS_TIMEOUT_SECONDS: ${YOUTUBE_CHECKS_TIMEOUT_SECONDS:-3600}
      YOUTUBE_CHECKS_LONG_RUNNING_EXTENSION_SECONDS: ${YOUTUBE_CHECKS_LONG_RUNNING_EXTENSION_SECONDS:-1800}
      YOUTUBE_CHECKS_PROGRESS_LOG_INTERVAL_SECONDS: ${YOUTUBE_CHECKS_PROGRESS_LOG_INTERVAL_SECONDS:-60}
      YOUTUBE_PRE_PUBLISH_REVIEW_TIMEOUT_SECONDS: ${YOUTUBE_PRE_PUBLISH_REVIEW_TIMEOUT_SECONDS:-900}
      YOUTUBE_RELOAD_AFTER_PUBLISH: ${YOUTUBE_RELOAD_AFTER_PUBLISH:-true}
      YOUTUBE_RELOAD_AFTER_PUBLISH_DELAY_SECONDS: ${YOUTUBE_RELOAD_AFTER_PUBLISH_DELAY_SECONDS:-10}
      YOUTUBE_MANUAL_SUBTITLE_TEXT: ${YOUTUBE_MANUAL_SUBTITLE_TEXT:-FCN}
      YOUTUBE_ADD_MANUAL_SUBTITLE: ${YOUTUBE_ADD_MANUAL_SUBTITLE:-true}
      YOUTUBE_SUBTITLE_TYPE_DELAY_MS: ${YOUTUBE_SUBTITLE_TYPE_DELAY_MS:-120}
      YOUTUBE_SUBTITLE_EDITOR_READY_DELAY_MS: ${YOUTUBE_SUBTITLE_EDITOR_READY_DELAY_MS:-1500}
      YOUTUBE_SUBTITLE_SEGMENT_READY_DELAY_MS: ${YOUTUBE_SUBTITLE_SEGMENT_READY_DELAY_MS:-3000}
      YOUTUBE_SUBTITLE_AFTER_TYPE_DELAY_MS: ${YOUTUBE_SUBTITLE_AFTER_TYPE_DELAY_MS:-500}
      YOUTUBE_SUBTITLE_ADD_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_ADD_TIMEOUT_MS:-12000}
      YOUTUBE_SUBTITLE_MODE_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_MODE_TIMEOUT_MS:-12000}
      YOUTUBE_SUBTITLE_TEXT_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_TEXT_TIMEOUT_MS:-20000}
      YOUTUBE_SUBTITLE_DONE_TIMEOUT_MS: ${YOUTUBE_SUBTITLE_DONE_TIMEOUT_MS:-12000}
      YOUTUBE_MANUAL_SUBTITLE_REQUIRED: ${YOUTUBE_MANUAL_SUBTITLE_REQUIRED:-true}
      YOUTUBE_UPLOAD_TIMEOUT_SECONDS: ${YOUTUBE_UPLOAD_TIMEOUT_SECONDS:-5400}
      YOUTUBE_STUDIO_NAV_TIMEOUT_MS: ${YOUTUBE_STUDIO_NAV_TIMEOUT_MS:-30000}
      YOUTUBE_DIRECT_UPLOAD_NAV_TIMEOUT_MS: ${YOUTUBE_DIRECT_UPLOAD_NAV_TIMEOUT_MS:-18000}
      YOUTUBE_DIRECT_UPLOAD_INPUT_TIMEOUT_MS: ${YOUTUBE_DIRECT_UPLOAD_INPUT_TIMEOUT_MS:-15000}
      YOUTUBE_ALLOW_DIRECT_UPLOAD_PAGE_FALLBACK: ${YOUTUBE_ALLOW_DIRECT_UPLOAD_PAGE_FALLBACK:-true}
      YOUTUBE_DRY_RUN: ${YOUTUBE_DRY_RUN:-false}
      YOUTUBE_CLOSE_UPLOAD_TAB: ${YOUTUBE_CLOSE_UPLOAD_TAB:-false}
      TELEGRAM_AI_BASE_URL: ${TELEGRAM_AI_BASE_URL:-http://127.0.0.1:11434/v1}
      TELEGRAM_AI_MODEL: ${TELEGRAM_AI_MODEL:-llama3.2-id:latest}
      TELEGRAM_AI_FALLBACK_MODELS: ${TELEGRAM_AI_FALLBACK_MODELS:-llama3.2-id:latest,llama3:latest}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-ClipForge}
      YOUTUBE_REQUIRE_AI_METADATA: ${YOUTUBE_REQUIRE_AI_METADATA:-true}
      YOUTUBE_DATA_API_KEY: ${YOUTUBE_DATA_API_KEY:-}
      VIRAL_CC_REQUIRE_YOUTUBE_DATA_API: ${VIRAL_CC_REQUIRE_YOUTUBE_DATA_API:-true}
      VIRAL_CC_SEARCH_QUERIES: ${VIRAL_CC_SEARCH_QUERIES:-}
      VIRAL_CC_VIDEO_COUNT: ${VIRAL_CC_VIDEO_COUNT:-5}
      VIRAL_CC_SEARCH_LIMIT: ${VIRAL_CC_SEARCH_LIMIT:-25}
      VIRAL_CC_MAX_METADATA_CHECKS: ${VIRAL_CC_MAX_METADATA_CHECKS:-200}
      VIRAL_CC_METADATA_PER_QUERY: ${VIRAL_CC_METADATA_PER_QUERY:-6}
      VIRAL_CC_MIN_VIEWS: ${VIRAL_CC_MIN_VIEWS:-1000}
      VIRAL_CC_FALLBACK_MIN_VIEWS: ${VIRAL_CC_FALLBACK_MIN_VIEWS:-100}
      VIRAL_CC_FALLBACK_MAX_AGE_DAYS: ${VIRAL_CC_FALLBACK_MAX_AGE_DAYS:-180}
      VIRAL_CC_MAX_API_QUERIES: ${VIRAL_CC_MAX_API_QUERIES:-12}
      VIRAL_CC_YTDLP_SEARCH_MODE: ${VIRAL_CC_YTDLP_SEARCH_MODE:-ytsearchdate}
      VIRAL_CC_MAX_SOURCE_SECONDS: ${VIRAL_CC_MAX_SOURCE_SECONDS:-7200}
      VIRAL_CC_SEARCH_HTTP_TIMEOUT_SECONDS: ${VIRAL_CC_SEARCH_HTTP_TIMEOUT_SECONDS:-900}
      VIRAL_CC_REGION_CODE: ${VIRAL_CC_REGION_CODE:-ID}
      VIRAL_CC_RELEVANCE_LANGUAGE: ${VIRAL_CC_RELEVANCE_LANGUAGE:-id}
      VIRAL_CC_YOUTUBE_API_ORDER: ${VIRAL_CC_YOUTUBE_API_ORDER:-viewCount}
      VIRAL_CC_TOPIC_ID: ${VIRAL_CC_TOPIC_ID:-}
      VIRAL_CC_ENFORCE_TOPIC_ID: ${VIRAL_CC_ENFORCE_TOPIC_ID:-false}
      AUTO_VIRAL_SEARCH_QUERIES: ${AUTO_VIRAL_SEARCH_QUERIES:-}
      AUTO_VIRAL_VIDEO_COUNT: ${AUTO_VIRAL_VIDEO_COUNT:-5}
      AUTO_VIRAL_MAX_SOURCE_SECONDS: ${AUTO_VIRAL_MAX_SOURCE_SECONDS:-7200}
      DEFAULT_AI_BASE_URL: http://127.0.0.1:11434/v1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    container_name: clipforge-frontend
    environment:
      BACKEND_API_BASE: http://172.18.0.1:8010
      BACKEND_API_BASES: http://172.18.0.1:8010,http://172.17.0.1:8010,http://host.docker.internal:8010,http://127.0.0.1:8010
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8010}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./backend
    container_name: clipforge-telegram-bot
    command: ["python", "telegram_bot.py"]
    network_mode: host
    volumes:
      - ./backend/outputs:/app/outputs:ro
      - ./backend/data:/app/data
      - /sys:/host/sys:ro
    environment:
      BACKEND_API_BASE: http://127.0.0.1:8010
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_ID: ${TELEGRAM_OWNER_ID:-}
      TELEGRAM_PUBLIC_BASE_URL: ${TELEGRAM_PUBLIC_BASE_URL:-}
      TELEGRAM_MAX_UPLOAD_MB: ${TELEGRAM_MAX_UPLOAD_MB:-49}
      TELEGRAM_BATTERY_POWER_SUPPLY_PATH: ${TELEGRAM_BATTERY_POWER_SUPPLY_PATH:-/host/sys/class/power_supply}
      TELEGRAM_BATTERY_ALERT_ENABLED: ${TELEGRAM_BATTERY_ALERT_ENABLED:-true}
      TELEGRAM_BATTERY_ALERT_LEVELS: ${TELEGRAM_BATTERY_ALERT_LEVELS:-20,10,5}
      TELEGRAM_BATTERY_CHECK_INTERVAL_SECONDS: ${TELEGRAM_BATTERY_CHECK_INTERVAL_SECONDS:-60}
      YOUTUBE_STUDIO_URL: ${YOUTUBE_STUDIO_URL:-https://studio.youtube.com/channel/UCAOZF9Qzj6DYoXKtLnP4UUQ}
      TELEGRAM_AI_BASE_URL: ${TELEGRAM_AI_BASE_URL:-http://127.0.0.1:11434/v1}
      TELEGRAM_AI_MODEL: ${TELEGRAM_AI_MODEL:-llama3.2-id:latest}
      TELEGRAM_AI_FALLBACK_MODELS: ${TELEGRAM_AI_FALLBACK_MODELS:-llama3.2-id:latest,llama3:latest}
      TELEGRAM_YOUTUBE_CDP_REFRESH_TIMEOUT_SECONDS: ${TELEGRAM_YOUTUBE_CDP_REFRESH_TIMEOUT_SECONDS:-60}
      VIRAL_CC_VIDEO_COUNT: ${VIRAL_CC_VIDEO_COUNT:-5}
      VIRAL_CC_SEARCH_LIMIT: ${VIRAL_CC_SEARCH_LIMIT:-25}
      VIRAL_CC_MAX_METADATA_CHECKS: ${VIRAL_CC_MAX_METADATA_CHECKS:-200}
      VIRAL_CC_MIN_VIEWS: ${VIRAL_CC_MIN_VIEWS:-1000}
      VIRAL_CC_MAX_SOURCE_SECONDS: ${VIRAL_CC_MAX_SOURCE_SECONDS:-7200}
      VIRAL_CC_SEARCH_HTTP_TIMEOUT_SECONDS: ${VIRAL_CC_SEARCH_HTTP_TIMEOUT_SECONDS:-900}
    depends_on:
      - backend
    init: true
    restart: unless-stopped
